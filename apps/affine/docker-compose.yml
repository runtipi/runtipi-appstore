services:
  affine:
    image: 'ghcr.io/toeverything/affine:stable'
    command:
      - 'sh'
      - '-c'
      - 'node ./scripts/self-host-predeploy && node ./dist/main.js'
    volumes:
      - '${APP_DATA_DIR}/data/config:/root/.affine/config'
      - '${APP_DATA_DIR}/data/storage:/root/.affine/storage'
    environment:
      - 'AFFINE_CONFIG_PATH=/root/.affine/config'
      - 'REDIS_SERVER_HOST=affine-redis'
      - 'DATABASE_URL=postgres://tipi:${AFFINE_POSTGRES_PASSWORD}@affine-postgres:5432/affine'
      - 'NODE_ENV=production'
      - 'AFFINE_ADMIN_EMAIL=${AFFINE_ADMIN_EMAIL}'
      - 'AFFINE_ADMIN_PASSWORD=${AFFINE_ADMIN_PASSWORD}'
      - 'TELEMETRY_ENABLE=${AFFINE_TELEMETRY_ENABLE}'
    depends_on:
      affine-redis:
        condition: 'service_healthy'
      affine-postgres:
        condition: 'service_healthy'
    logging:
      driver: 'json-file'
      options:
        max-size: '1000m'
    x-runtipi:
      internal_port: 3010
      is_main: true
  affine-redis:
    image: 'redis'
    volumes:
      - '${APP_DATA_DIR}/data/redis:/data'
    healthcheck:
      test: 'redis-cli --raw incr ping'
      interval: '10s'
      timeout: '5s'
      retries: 5
  affine-postgres:
    image: 'postgres:16'
    volumes:
      - '${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_USER=tipi'
      - 'POSTGRES_PASSWORD=${AFFINE_POSTGRES_PASSWORD}'
      - 'POSTGRES_DB=affine'
    healthcheck:
      test: 'pg_isready -d postgres://tipi:${AFFINE_POSTGRES_PASSWORD}@affine-postgres:5432/affine'
      interval: '10s'
      timeout: '5s'
      retries: 5
x-runtipi:
  schema_version: 2
